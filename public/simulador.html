<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador DC/DC</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- 🔐 PROTECCIÓN -->
<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "index.html";
}
</script>

<h1>Simulador DC/DC</h1>

<label>Vin:</label>
<input type="number" id="vin" value="12">

<br><br>

<label>Duty:</label>
<input type="range" id="duty" min="0" max="0.9" step="0.01" value="0.5">

<span id="dutyValue">0.5</span>

<br><br>

<p id="resultado">Resultado aquí...</p>

<br>
<button onclick="volver()">Volver</button>
<button onclick="logout()">Cerrar sesión</button>

<script>

    const slider = document.getElementById("duty");
    const output = document.getElementById("dutyValue");

slider.oninput = function() {
    output.innerText = this.value;
    calcular(); // 🔥 calcula automáticamente
}

async function calcular() {
    const vin = parseFloat(document.getElementById("vin").value);
    const duty = parseFloat(document.getElementById("duty").value);

    try {
        const res = await fetch("/calculate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json" ,
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ vin, duty })
        });

        const data = await res.json();

        if (data.error) {
            document.getElementById("resultado").innerText = data.error;
        } else {
            document.getElementById("resultado").innerText =
                `Vout: ${data.vout} V | Estado: ${data.estado}`;
        }

    } catch (error) {
        document.getElementById("resultado").innerText = "Error conectando con el servidor";
    }
}

function volver() {
    window.location.href = "home.html";
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}
</script>

</body>
</html>
